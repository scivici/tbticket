services:
  postgres:
    image: postgres:16-alpine
    container_name: tbticket-db
    environment:
      - POSTGRES_DB=tickets
      - POSTGRES_USER=ticketuser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ticketpass}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketuser -d tickets"]
      interval: 5s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:1.4
    container_name: tbticket-clamav
    volumes:
      - clamav_data:/var/lib/clamav
      - /home/support/incoming/uploads:/app/server/uploads:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc localhost 3310 | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tbticket
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - DATABASE_URL=postgresql://ticketuser:${POSTGRES_PASSWORD:-ticketpass}@postgres:5432/tickets
      - CLAUDE_SERVER_URL=${CLAUDE_SERVER_URL:-http://claude-support-2.telcobridges.lan}
      - CLAUDE_USER=${CLAUDE_USER:-support}
      - CLAUDE_PASS=${CLAUDE_PASS:-support}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:4001}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-support@telcobridges.com}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - TEAMS_WEBHOOK_URL=${TEAMS_WEBHOOK_URL:-}
      - APP_URL=${APP_URL:-http://ticket.telcobridges.lan:4001}
      - UPLOAD_DIR=/app/server/uploads
      - UPLOAD_HOST_PATH=/home/support/incoming/uploads
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - CLAMAV_REQUIRED=${CLAMAV_REQUIRED:-true}
    volumes:
      - /home/support/incoming/uploads:/app/server/uploads
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - 10.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "claude-support-2.telcobridges.lan:10.0.0.241"

volumes:
  pg_data:
  clamav_data:
