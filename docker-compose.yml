services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tbticket
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - PORT=4001
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - CLAUDE_SERVER_URL=${CLAUDE_SERVER_URL:-http://host.docker.internal:3002}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:4001}
      - DB_PATH=/app/server/data/tickets.db
      - UPLOAD_DIR=/app/server/uploads
    volumes:
      - ticket_data:/app/server/data
      - ticket_uploads:/app/server/uploads
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ticket_data:
  ticket_uploads:
