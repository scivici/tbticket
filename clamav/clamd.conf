# ClamAV daemon configuration for Docker
Foreground yes
DatabaseDirectory /var/lib/clamav

TCPSocket 3310
TCPAddr 0.0.0.0

# Stream scanning limits (INSTREAM protocol)
StreamMaxLength 209715200

# General scan limits
MaxFileSize 209715200
MaxScanSize 419430400
MaxRecursion 17
MaxFiles 10000

# Logging
LogTime yes
LogClean no
LogSyslog no

# Self-check interval (seconds)
SelfCheck 600
